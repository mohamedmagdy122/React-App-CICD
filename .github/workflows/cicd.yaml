name: CI/CD Pipeline

on:
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install
      continue-on-error: true

    - name: Lint
      run: npm run lint
      continue-on-error: true

    - name: Test
      run: npm run test
      continue-on-error: true

    - name: Build
      run: npm run build
      continue-on-error: true

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/react-app-cicd:latest
          ghcr.io/${{ github.repository_owner }}/react-app-cicd:${{ github.sha }}

    - name: Update GitOps Repo
      run: |
        git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/mohamedmagdy122/argocd-gitops-repo.git
        cd argocd-gitops-repo
        sed -i "s|image: .*|image: ghcr.io/mohamedmagdy122/react-app-cicd:${{ github.sha }}|" react-app/deployment.yaml
        git config user.email "ci@github.com"
        git config user.name "GitHub Actions"
        git add react-app/deployment.yaml
        git diff --cached --quiet && echo "No changes" || git commit -m "ci: update react-app image to ${{ github.sha }}"
        git push || echo "Nothing to push"
