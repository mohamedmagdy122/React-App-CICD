name: Self-Hosted CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build static files
        run: npm run build

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/mohamedmagdy122/react-app-cicd:${{ github.sha }}

  deploy:
    runs-on: docker
    needs: build

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          docker pull ghcr.io/mohamedmagdy122/react-app-cicd:${{ github.sha }}

      - name: Stop existing container
        run: |
          docker rm -f react-app || true
          docker ps -q --filter "publish=8080" | xargs -r docker rm -f

      - name: Run Docker container
        run: |
          docker run -d --name react-app \
            -p 8080:80 \
            ghcr.io/mohamedmagdy122/react-app-cicd:${{ github.sha }}

      - name: Verify application is running
        run: |
          sleep 5
          CONTAINER_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' react-app)
          echo "Container IP: $CONTAINER_IP"
          curl -f http://$CONTAINER_IP:80
          echo "Application is running!"

      - name: Show running containers
        run: docker ps
