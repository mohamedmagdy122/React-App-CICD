name: CI-FluxCD

on:
  workflow_dispatch:
  # push:
  #   branches: [ "main" ]

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # needed for git tag history

    - uses: actions/setup-node@v6.1.0
      with:
        node-version: 20

    - name: Installing Dependencies
      run: npm install

    - name: lint Phase
      run: npm run lint
      continue-on-error: true

    - name: unit test
      run: npm run test
      continue-on-error: true

    - name: Building Static Files
      run: npm run build

    - name: Get latest semver tag and increment
      id: semver
      run: |
        # Fetch all tags
        git fetch --tags

        # Get the latest semver tag, default to 0.0.0 if none exists
        LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
        if [ -z "$LATEST_TAG" ]; then
          LATEST_TAG="v0.0.0"
        fi

        # Strip the 'v' prefix
        VERSION=${LATEST_TAG#v}

        # Split into major.minor.patch
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

        # Increment patch version
        PATCH=$((PATCH + 1))

        # New version
        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
        echo "New version: ${NEW_VERSION}"

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: docker/build-push-action@v6.18.0
      with:
        push: true
        tags: |
          ghcr.io/${{ github.actor }}/react-app-cicd:${{ steps.semver.outputs.new_version }}
          ghcr.io/${{ github.actor }}/react-app-cicd:latest
        context: .

    - name: Push new git tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag "v${{ steps.semver.outputs.new_version }}"
        git push origin "v${{ steps.semver.outputs.new_version }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}