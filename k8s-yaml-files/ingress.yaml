apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: route-demo-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: route-demo.example.com      # 🔁 change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: route-demo-svc
                port:
                  number: 80